<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow • Productivity App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-tasks text-3xl text-blue-600"></i>
                <h1 class="text-4xl font-semibold">TaskFlow</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" class="px-4 py-2 rounded-xl bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 flex items-center gap-2">
                    <i class="fa-solid fa-moon"></i>
                    <span id="mode-text">Dark Mode</span>
                </button>
                <button onclick="exportTasks()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-xl flex items-center gap-2">
                    <i class="fa-solid fa-download"></i> Export
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Sidebar Filters -->
            <div class="lg:col-span-3 bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-sm h-fit">
                <h2 class="font-semibold mb-4 text-lg">Filters</h2>
                <div onclick="filterTasks('all')" class="filter-btn active flex items-center gap-3 p-3 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer mb-1" id="filter-all">
                    <i class="fa-solid fa-list"></i> All Tasks
                </div>
                <div onclick="filterTasks('today')" class="filter-btn flex items-center gap-3 p-3 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer mb-1" id="filter-today">
                    <i class="fa-solid fa-calendar-day"></i> Today
                </div>
                <div onclick="filterTasks('upcoming')" class="filter-btn flex items-center gap-3 p-3 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer mb-1" id="filter-upcoming">
                    <i class="fa-solid fa-clock"></i> Upcoming
                </div>
                <div onclick="filterTasks('completed')" class="filter-btn flex items-center gap-3 p-3 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer" id="filter-completed">
                    <i class="fa-solid fa-check-circle"></i> Completed
                </div>

                <div class="mt-10">
                    <h3 class="font-medium mb-3">Quick Stats</h3>
                    <div id="stats" class="space-y-4 text-sm"></div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="lg:col-span-9">
                <!-- Add New Task -->
                <div class="bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-sm mb-6">
                    <form id="task-form" class="flex flex-col md:flex-row gap-4">
                        <input type="text" id="task-input" placeholder="What needs to be done?" class="flex-1 px-5 py-4 bg-gray-100 dark:bg-gray-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        <input type="date" id="due-date" class="px-5 py-4 bg-gray-100 dark:bg-gray-800 rounded-2xl focus:outline-none">
                        <select id="priority" class="px-5 py-4 bg-gray-100 dark:bg-gray-800 rounded-2xl focus:outline-none">
                            <option value="high">High</option>
                            <option value="medium" selected>Medium</option>
                            <option value="low">Low</option>
                        </select>
                        <button type="submit" class="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-2xl flex items-center gap-2">
                            <i class="fa-solid fa-plus"></i> Add Task
                        </button>
                    </form>
                </div>

                <!-- Task List -->
                <div id="task-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
